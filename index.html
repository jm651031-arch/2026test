<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中華健言社100期會外會報名</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    background:#fff8f2;
    color:#333;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.header{
    background:#ff8c2a;
    color:white;
    padding:30px 20px;
    text-align:center;
}

.header h1{
    font-size:28px;
    margin-bottom:10px;
}

.header h2{
    font-size:20px;
    font-weight:normal;
}

.info{
    padding:20px;
    line-height:1.8;
    font-size:16px;
}

.info p{
    margin-bottom:8px;
}

form{
    padding:0 20px 25px;
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:6px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

.radio-group{
    display:flex;
    gap:20px;
    margin-top:8px;
}

.radio-group label{
    font-weight:normal;
    display:flex;
    align-items:center;
    gap:6px;
    margin:0;
}

.note{
    color:#777;
    font-size:13px;
    margin-top:5px;
}

button{
    width:100%;
    margin-top:30px;
    padding:16px;
    background:#ff8c2a;
    color:white;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#f57c00;
}

.footer{
    text-align:center;
    color:#888;
    font-size:13px;
    padding:20px;
}
</style>

</head>
<body>

<div class="container">

<div class="card">

<div class="header">
<h1>🎉 中華健言社</h1>
<h2>100 期會外會報名</h2>
</div>

<div class="info">
<p>📅 <strong>日期：</strong>2026/10/10（六）09:00–16:00</p>
<p>📍 <strong>地點：</strong>新城風糖休閒園區</p>
<p>💰 <strong>費用：</strong></p>
<p>會員 NT$550</p>
<p>非會員 NT$700（含保險）</p>
</div>

<form>

<label>姓名</label>
<input type="text" placeholder="請輸入姓名" required>

<label>手機</label>
<input type="tel" placeholder="09xxxxxxxx" required>

<label>身分證字號</label>
<input type="text" placeholder="請輸入身分證字號" required>

<div class="note">
※ 僅供保險投保使用。
</div>

<label>所屬社團</label>
<select required>
<option value="">請選擇</option>
<option>諄言社</option>
<option>三重社</option>
<option>三峽社</option>
<option>鶯歌社</option>
<option>竹北社</option>
<option>新竹社</option>
<option>中壢社</option>
<option>湖口社</option>
</select>

<label>餐點</label>

<div class="radio-group">
<label><input type="radio" name="meal">葷食</label>
<label><input type="radio" name="meal">素食</label>
</div>

<button type="submit">
立即報名
</button>

</form>

<div class="footer">
中華健言社100期會外會
</div>

</div>

</div>

</body>
</html>
